<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Heartfelt birthday wishes written just for Grace Jude by the people who love her most. Open each one and feel the love.">
  <meta name="keywords" content="Grace Jude, Nenye, birthday wishes, messages, love, friends, family">
  <meta name="author" content="Project Confetti Cloud">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Birthday Wishes — Grace Jude">
  <meta property="og:description" content="Heartfelt wishes written with love for Grace Jude's special day.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://projectconfetticloud.io/wishes.html">
  <meta property="og:image" content="assets/images/og-image.jpg">
  <meta property="og:site_name" content="Project Confetti Cloud">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Birthday Wishes — Grace Jude">
  <meta name="twitter:description" content="Heartfelt wishes written with love for Grace Jude's special day.">
  <meta name="twitter:image" content="assets/images/og-image.jpg">

  <meta name="theme-color" content="#FFF8F3">
  <title>Birthday Wishes — Grace Jude</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/wishes.css">
</head>
<body>

  <!-- Shared carousel background (behind all page content) -->
  <div id="page-carousel" class="page-carousel-bg" aria-hidden="true"></div>

  <div class="wishes-page page">

    <!-- Back to menu -->
    <a href="menu.html" class="back-btn">
      <span class="arrow">&#8592;</span> Back
    </a>

    <!-- Audio mute toggle -->
    <button class="audio-toggle" id="audio-toggle" aria-label="Toggle music" hidden>
      <span id="audio-icon">🔊</span>
    </button>

    <!-- Page header -->
    <header class="section-header wishes-header">
      <span class="label">Just for You</span>
      <h1>Birthday Wishes</h1>
      <p class="subtitle">
        Open each one. Let the words find you.<br>
        Every line was written with you in mind.
      </p>
    </header>

    <!-- Wish cards — injected by wishes.js -->
    <main class="wishes-grid container" id="wishes-container" aria-label="Birthday wishes"></main>

    <!-- Footer -->
    <footer class="wishes-footer">
      <p class="script">Every word written with love. 🌸</p>
    </footer>

  </div>

  <!-- Background audio -->
  <audio id="wishes-audio" loop preload="auto">
    <source src="assets/audio/wishes-song.mp3" type="audio/mpeg">
  </audio>

  <script src="js/data/config.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/data/wishesData.js"></script>
  <script src="js/wishes.js"></script>
  <script src="js/transitions.js"></script>

</body>
</html>

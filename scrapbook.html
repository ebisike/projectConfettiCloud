<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Grace Jude's scrapbook — all the photos, videos, and memories from her birthday celebration in one playful place.">
  <meta name="keywords" content="Grace Jude, Nenye, scrapbook, photos, videos, memories, birthday">
  <meta name="author" content="Project Confetti Cloud">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Scrapbook — Grace Jude">
  <meta property="og:description" content="All the photos and memories from Grace Jude's birthday celebration.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://projectconfetticloud.io/scrapbook.html">
  <meta property="og:image" content="assets/images/og-image.jpg">
  <meta property="og:site_name" content="Project Confetti Cloud">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Scrapbook — Grace Jude">
  <meta name="twitter:description" content="All the photos and memories from Grace Jude's birthday celebration.">
  <meta name="twitter:image" content="assets/images/og-image.jpg">

  <meta name="theme-color" content="#F7EDE0">
  <title>Scrapbook — Grace Jude</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/scrapbook.css">
</head>
<body>

  <!-- Shared carousel background -->
  <div id="page-carousel" class="page-carousel-bg" aria-hidden="true"></div>

  <div class="scrapbook-page page">

    <!-- Back to menu -->
    <a href="menu.html" class="back-btn">
      <span class="arrow">&#8592;</span> Back
    </a>

    <!-- Page header -->
    <header class="section-header scrapbook-header">
      <span class="label">Every Memory</span>
      <h1>Our Scrapbook</h1>
      <p class="subtitle">
        Drag the pictures around &mdash; make it yours.<br>
        Tap any photo or video to see it bigger.
      </p>
    </header>

    <!-- Canvas where polaroids live -->
    <div class="scrapbook-canvas" id="scrapbook-canvas"></div>

  </div>

  <!-- Floating action bar -->
  <div class="scrapbook-toolbar" aria-label="Scrapbook controls">
    <button class="toolbar-btn btn-shuffle" id="btn-shuffle" aria-label="Shuffle photos">
      &#x1F500;&ensp;Shuffle
    </button>
    <button class="toolbar-btn btn-tidy"    id="btn-tidy"    aria-label="Tidy up photos">
      &#8862;&ensp;Tidy Up
    </button>
  </div>

  <script src="js/data/config.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/data/journeyData.js"></script>
  <script src="js/data/wishesData.js"></script>
  <script src="js/scrapbook.js"></script>
  <script src="js/transitions.js"></script>

</body>
</html>
